<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการการบ้าน - HOKKADEE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="icons.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <img src="images/hkd3.png" alt="HOKKADEE" class="nav-logo-img">
    </a>
    <div class="nav-links">
      <a href="index.html">หน้าแรก</a>
      <a href="schedule.html">ตารางสอน</a>
      <a href="homework.html">การบ้าน</a>
      <a href="homework-manage.html" class="active">จัดการการบ้าน</a>
    </div>
  </div>
</nav>

<div class="container">
  <h1 class="section-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> จัดการการบ้าน</h1>
  <div class="section-line"></div>

  <!-- Search / Filter -->
  <div class="hm-toolbar">
    <input class="hm-input hm-search" id="hmSearch" placeholder="ค้นหาการบ้าน..." oninput="renderTable()">
    <select class="hm-input hm-filter" id="hmFilter" onchange="renderTable()">
      <option value="all">ทั้งหมด</option>
      <option value="pending">ยังไม่เสร็จ</option>
      <option value="done">เสร็จแล้ว</option>
    </select>
  </div>

  <!-- Table -->
  <div class="hm-table-wrap">
    <table class="hm-table">
      <thead>
        <tr>
          <th>#</th>
          <th>วิชา</th>
          <th>การบ้าน</th>
          <th>รายละเอียด</th>
          <th>กำหนดส่ง</th>
          <th>สถานะ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="hmBody"></tbody>
    </table>
  </div>

</div>

<script>
const STORAGE_KEY = 'hokkadee_homework';

const hwIcons = {
  'เขียนโปรแกรมแบบวิชวล': ICONS.monitor,
  'ออกแบบ UX/UI': ICONS.palette,
  'เขียนโปรแกรมเชิงวัตถุ': ICONS.puzzle,
  'จัดการเชิงกลยุทธ์': ICONS.chart,
  'วิเคราะห์และออกแบบระบบ': ICONS.clipboard,
  'สื่อสารข้อมูลธุรกิจ': ICONS.globe,
};

const seedData = [
  { id: 1, subj: 'เขียนโปรแกรมแบบวิชวล', task: 'สร้างเว็บ CRUD ด้วย C#', detail: 'สร้าง CRUD Web Application ด้วย ASP.NET MVC', due: '12 ก.ค. 69', done: false },
  { id: 2, subj: 'ออกแบบ UX/UI', task: 'ออกแบบ Mobile App Prototype', detail: '', due: '15 ก.ค. 69', done: false },
  { id: 3, subj: 'เขียนโปรแกรมเชิงวัตถุ', task: 'ส่งงาน UML Diagram', detail: '', due: '18 ก.ค. 69', done: false },
  { id: 4, subj: 'จัดการเชิงกลยุทธ์', task: 'รายงานการวิเคราะห์คู่แข่ง', detail: '', due: '20 ก.ค. 69', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'Analysis Report บริษัทตัวอย่าง', detail: '', due: '22 ก.ค. 69', done: false },
  { id: 6, subj: 'สื่อสารข้อมูลธุรกิจ', task: 'จำลองเครือข่ายด้วย Packet Tracer', detail: '', due: '25 ก.ค. 69', done: false },
];

function loadHomework() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return JSON.parse(stored);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(seedData));
  return seedData;
}

function saveHomework(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
}

function toggleDone(id) {
  const data = loadHomework();
  const item = data.find(h => h.id === id);
  if (item) item.done = !item.done;
  saveHomework(data);
  renderTable();
}

function deleteHomework(id) {
  if (!confirm('ลบการบ้านนี้?')) return;
  let data = loadHomework();
  data = data.filter(h => h.id !== id);
  saveHomework(data);
  renderTable();
}

function editHomework(id) {
  const data = loadHomework();
  const item = data.find(h => h.id === id);
  if (!item) return;

  const newTask = prompt('แก้ไขชื่อการบ้าน:', item.task);
  if (newTask === null) return;
  const trimmed = newTask.trim();
  if (!trimmed) { alert('ชื่อการบ้านห้ามว่าง'); return; }

  item.task = trimmed;
  saveHomework(data);
  renderTable();
}

function editDetail(id) {
  const data = loadHomework();
  const item = data.find(h => h.id === id);
  if (!item) return;

  const newDetail = prompt('แก้ไขรายละเอียดการบ้าน:', item.detail);
  if (newDetail === null) return;

  item.detail = newDetail.trim();
  saveHomework(data);
  renderTable();
}

function renderTable() {
  const data = loadHomework();
  const search = (document.getElementById('hmSearch').value || '').toLowerCase();
  const filter = document.getElementById('hmFilter').value;

  let filtered = data.filter(h => {
    if (filter === 'pending' && h.done) return false;
    if (filter === 'done' && !h.done) return false;
    if (search && !h.task.toLowerCase().includes(search) && !h.subj.toLowerCase().includes(search)) return false;
    return true;
  });

  const tbody = document.getElementById('hmBody');
  tbody.innerHTML = filtered.map((h, i) => `
    <tr class="${h.done ? 'hm-row-done' : ''}">
      <td>${i + 1}</td>
      <td>${hwIcons[h.subj] || ICONS.book} ${h.subj}</td>
      <td>${h.task}</td>
      <td>${h.detail || '-'}</td>
      <td>${ICONS.calendar} ${formatDate(h.due)}</td>
      <td>
        <span class="hm-status ${h.done ? 'hm-status-done' : 'hm-status-pending'}">
          ${h.done ? ICONS.checkCircle + ' เสร็จ' : ICONS.hourglass + ' รอส่ง'}
        </span>
      </td>
      <td class="hm-actions">
        <button class="hm-btn-icon hm-toggle-btn" onclick="toggleDone(${h.id})" title="${h.done ? 'เปลี่ยนเป็นยังไม่เสร็จ' : 'เปลี่ยนเป็นเสร็จ'}">
          ${h.done ? ICONS.repeat : ICONS.checkCircle}
        </button>
        <button class="hm-btn-icon hm-edit-btn" onclick="editHomework(${h.id})" title="แก้ไข">${ICONS.pencil}</button>
        <button class="hm-btn-icon hm-edit-detail-btn" onclick="editDetail(${h.id})" title="แก้ไขรายละเอียด">${ICONS.fileText}</button>
        <button class="hm-btn-icon hm-del-btn" onclick="deleteHomework(${h.id})" title="ลบ">${ICONS.trash}</button>
      </td>
    </tr>
  `).join('');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666;padding:40px">ไม่พบรายการ</td></tr>';
  }
}

renderTable();

localStorage.removeItem('theme');
</script>

<style>
