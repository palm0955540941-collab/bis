<script>
const hwIcons = {
  'เขียนโปรแกรมแบบวิชวล': ICONS.monitor,
  'ออกแบบ UX/UI': ICONS.palette,
  'เขียนโปรแกรมเชิงวัตถุ': ICONS.puzzle,
  'จัดการเชิงกลยุทธ์': ICONS.chart,
  'วิเคราะห์และออกแบบระบบ': ICONS.clipboard,
  'สื่อสารข้อมูลธุรกิจ': ICONS.globe,
  'จัดกระบวนการทางธุรกิจ': ICONS.zap,
};

const seedData = [
  { id: 1, subj: 'เขียนโปรแกรมแบบวิชวล', task: 'แบบฝึกหัดท้ายหน่วยเรียนที่ 1', detail: 'แบบฝึกหัดท้ายบท ', due: '2026-07-6 23:59:00', done: false },
  { id: 1, subj: 'เขียนโปรแกรมแบบวิชวล', task: 'แบบฝึกหัดท้ายหน่วยเรียนที่ 2', detail: 'แบบฝึกหัดท้ายบท ', due: '2026-07-7 11:59:00', done: false },
  { id: 2, subj: 'ออกแบบ UX/UI', task: 'ออกแบบสร้างฟอร์มสำหรับกรอกข้อมูลนักศึกษา', detail: 'ออกแบบฟอร์มแบบไหนก็ได้จ้า และโปรแกรมไหนก็ได้จ้า', due: '2026-07-07 23:59:00', done: false },
  { id: 3, subj: 'เขียนโปรแกรมเชิงวัตถุ', task: 'แบบฝึกหัดท้ายหน่วยเรียนที่ 1', detail: '', due: '2026-07-6 23:59:00', done: false },
  { id: 3, subj: 'เขียนโปรแกรมเชิงวัตถุ', task: 'แบบฝึกหัดท้ายหน่วยเรียนที่ 3', detail: '', due: '2026-07-13 23:59:00', done: false },
  { id: 4, subj: 'จัดการเชิงกลยุทธ์', task: 'ธุรกิจที่ประสบความสําเร็จ และ ธุรกิจที่ล้มเหลว', detail: '', due: '2026-07-9 23:59:00', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'แบบฝึกหัดท้ายบทที่ 1', detail: '', due: '2026-07-5 23:59:00', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'งานกลุ่มภายในห้อง', detail: '', due: '2026-07-5 23:59:00', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'แบบฝึกหัดท้ายบทที่ 2', detail: '', due: '2026-07-12 23:59:00', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'งานกลุ่มภายในห้องครั้งที่ 2', detail: '', due: '2026-07-12 23:59:00', done: false },
  { id: 5, subj: 'วิเคราะห์และออกแบบระบบ', task: 'งานกลุ่มการบ้านครั้งที่ 2', detail: '', due: '2026-07-12 23:59:00', done: false },
  { id: 6, subj: 'สื่อสารข้อมูลธุรกิจ', task: 'ใบงานที่ 1 พื้นฐานการสื่อสารข้อมูลและเครือข่าย', detail: 'ทำแบบฝึกหัดท้ายบทและกรณีศึกษา', due: '2026-07-8 23:59:00', done: false },
  { id: 6, subj: 'สื่อสารข้อมูลธุรกิจ', task: 'ใบงานที่ 2 แบบจำลองการสื่อสารข้อมูล OSI และ Internet Model', detail: 'ทำแบบฝึกหัดท้ายบท', due: '2026-07-10 23:59:00', done: false },
  { id: 7, subj: 'จัดกระบวนการทางธุรกิจ', task: 'ใบงานที่ 1', detail: '', due: '2026-07-07 23:59:00', done: false },
  { id: 7, subj: 'จัดกระบวนการทางธุรกิจ', task: 'ใบงานที่ 1.1', detail: '', due: '2026-07-07 23:59:00', done: false },
];

function formatDate(dateStr) {
  if (!dateStr) return '';
  if (!dateStr.includes('-')) return dateStr;
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
}



function startCountdown() {
  const els = document.querySelectorAll('[data-due]');
  if (!els.length) return;
  const now = Date.now();
  els.forEach(el => {
    const target = new Date(el.dataset.due).getTime();
    const diff = target - now;
    if (diff <= 0) {
      el.textContent = '⏰ หมดเวลาส่งงานแล้ว!';
      el.className = 'hw-countdown overdue';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    el.textContent = `⏱ ${days}วัน ${hrs}ชม ${mins}น ${secs}วิ`;
    el.className = 'hw-countdown' + (days < 3 ? ' urgent' : '');
  });
}

function renderSubjects() {
  const homework = seedData;
  const subjects = Object.keys(hwIcons);
  const grid = document.getElementById('hw-subj-grid');
  grid.innerHTML = subjects.map(s => {
    const items = homework.filter(h => h.subj === s);
    return `
      <div class="hw-subj-btn" onclick="showHwDetail('${s}')">
        <div class="hw-subj-icon">${hwIcons[s] || ICONS.book}</div>
        <div class="hw-subj-name">${s}</div>
        <div class="hw-subj-count">${items.length} งาน</div>
      </div>
    `;
  }).join('');
}

function showHwDetail(subj) {
  document.getElementById('hw-subject-view').style.display = 'none';
  document.getElementById('hw-detail-view').style.display = 'block';
  document.getElementById('hw-detail-title').textContent = subj;
  renderHwList(subj);
}

function showHwSubjects() {
  document.getElementById('hw-subject-view').style.display = 'block';
  document.getElementById('hw-detail-view').style.display = 'none';
}

function renderHwList(subj) {
  const items = seedData.filter(h => h.subj === subj);
  const list = document.getElementById('hw-list');
  list.innerHTML = items.map(h => `
    <div class="hw-card">
      <div class="hw-task">${h.task}</div>
      ${h.detail ? `<div class="hw-detail">${h.detail}</div>` : ''}
      <div class="hw-foot">
        <span class="hw-due">${ICONS.calendar} ${formatDate(h.due)}</span>
        <span class="hw-countdown" data-due="${h.due}"></span>
      </div>
    </div>
  `).join('');
  if (items.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#666;padding:40px">ไม่มีการบ้านในวิชานี้</p>';
  }
  startCountdown();
}

renderSubjects();
setInterval(startCountdown, 1000);
</script>

<style>

  transform: translateX(-4px);

.hw-detail {

</style>

<script>
document.querySelector('.nav-toggle').addEventListener('click', function() {
  const nav = document.querySelector('.nav-links');
  nav.classList.toggle('open');
  this.classList.toggle('active');
  this.setAttribute('aria-expanded', nav.classList.contains('open'));
});
document.querySelectorAll('.nav-links a').forEach(function(link) {
  link.addEventListener('click', function() {
    document.querySelector('.nav-links').classList.remove('open');
    document.querySelector('.nav-toggle').classList.remove('active');
    document.querySelector('.nav-toggle').setAttribute('aria-expanded', 'false');
  });
});

localStorage.removeItem('theme');
</script>
